<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#15803d"/>
      <stop offset="100%" style="stop-color:#052e16"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#4ade80" stroke-width="16" opacity="0.4"/>
  <!-- Circular arrows (circuit symbol) -->
  <path d="M256 90 A166 166 0 1 1 120 340" fill="none" stroke="url(#glow)" stroke-width="28" stroke-linecap="round"/>
  <path d="M256 90 A166 166 0 0 0 392 340" fill="none" stroke="#22c55e" stroke-width="28" stroke-linecap="round" opacity="0.5"/>
  <!-- Arrow head top -->
  <polygon points="256,56 290,108 222,108" fill="#4ade80"/>
  <!-- Arrow head bottom-right -->
  <polygon points="410,352 358,330 386,290" fill="#22c55e" opacity="0.7"/>
  <!-- Center circle -->
  <circle cx="256" cy="256" r="70" fill="#052e16" stroke="#4ade80" stroke-width="6"/>
  <!-- "CP" text in center -->
  <text x="256" y="246" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#4ade80" text-anchor="middle" dominant-baseline="middle">CP</text>
  <text x="256" y="290" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#86efac" text-anchor="middle">PLANNER</text>
</svg>
