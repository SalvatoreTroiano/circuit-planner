name: Deploy Circuit Planner to GitHub Pages

on:
  # Si attiva ad ogni push sul branch main
  push:
    branches: ["main"]
  # Permette di avviare manualmente dalla tab Actions
  workflow_dispatch:

# Permessi per il deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploy paralleli
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v4

      - name: 📦 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Carica la root del repository
          path: '.'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
